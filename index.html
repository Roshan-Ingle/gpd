<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GP Deployer</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 3D Glassmorphism & Liquid Variables */
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-border-highlight: rgba(255, 255, 255, 0.25);
            --glass-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
            
            --neon-blue: #00e1ff;
            --neon-pink: #ff007f;
            --neon-purple: #7000ff;
            --neon-green: #00ff88;
            --error-color: #ff3366;

            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --text-dark: rgba(0, 0, 0, 0.8);
        }

        body {
            background-color: #050508;
            color: var(--text-main);
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Animated Liquid Background Blobs */
        .liquid-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #08080c;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .blob-1 { width: 350px; height: 350px; background: var(--neon-pink); top: -10%; left: -10%; }
        .blob-2 { width: 450px; height: 450px; background: var(--neon-blue); bottom: -20%; right: -10%; animation-delay: -5s; }
        .blob-3 { width: 300px; height: 300px; background: var(--neon-purple); top: 40%; left: 30%; animation-duration: 25s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(40px, 60px) scale(1); }
        }

        /* 3D Glass Container */
        .app-container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.01));
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            width: 100%;
            max-width: 420px;
            border-radius: 36px;
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-border-highlight);
            border-left: 1px solid var(--glass-border-highlight);
            box-shadow: var(--glass-shadow), inset 0 0 32px rgba(255,255,255,0.02);
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
            transition: all 0.4s cubic-bezier(0.2, 0, 0, 1);
        }

        .header-area {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 32px;
            color: var(--text-main);
            margin: 0 0 8px 0;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }

        .subtitle {
            font-size: 14px;
            color: var(--neon-blue);
            font-weight: 700;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-shadow: 0 0 8px rgba(0, 225, 255, 0.4);
        }
        
        #inputScreen {
            transition: opacity 0.3s, transform 0.3s;
            flex-grow: 1;
        }

        .input-group { margin-bottom: 24px; }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            margin-left: 8px;
            color: var(--text-muted);
            font-weight: 700;
        }

        /* 3D Inset Glass Inputs */
        input[type="text"], input[type="password"], input[type="file"] {
            width: 100%;
            padding: 18px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-main);
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 600;
            box-sizing: border-box;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.02);
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
        }

        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            background: rgba(0, 0, 0, 0.4);
            border-color: var(--neon-blue);
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.6), 0 0 16px rgba(0, 225, 255, 0.2);
        }

        input::placeholder { color: rgba(255,255,255,0.3); }

        input[type="file"] { padding: 12px 14px; }

        /* 3D File Button */
        input[type="file"]::file-selector-button {
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-border-highlight);
            padding: 10px 18px;
            border-radius: 14px;
            margin-right: 16px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }

        input[type="file"]::file-selector-button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .action-container { margin-top: 40px; }

        /* 3D Liquid Glass Primary Button */
        button#deployBtn, button#resetBtn {
            width: 100%;
            padding: 18px;
            border-radius: 100px;
            border: none;
            background: linear-gradient(135deg, rgba(0, 225, 255, 0.8), rgba(112, 0, 255, 0.8));
            color: var(--text-main);
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 17px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 225, 255, 0.3), inset 0 2px 2px rgba(255,255,255,0.4), inset 0 -4px 8px rgba(0,0,0,0.2);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        /* Liquid light sweep effect on button */
        button#deployBtn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-20deg);
            animation: sweep 4s infinite;
        }

        @keyframes sweep {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        button#deployBtn:active, button#resetBtn:active {
            transform: translateY(4px) scale(0.96);
            box-shadow: 0 4px 12px rgba(0, 225, 255, 0.3), inset 0 2px 6px rgba(0,0,0,0.3);
        }

        button:disabled {
            filter: grayscale(1) opacity(0.5);
            cursor: not-allowed;
            transform: none !important;
        }

        /* Timeline / Progress Screen */
        #progressScreen {
            display: none;
            flex-direction: column;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        #progressScreen.active {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        .progress-header { margin-bottom: 32px; }

        .progress-bar-bg {
            height: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 100px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
            border-radius: 100px;
            box-shadow: 0 0 10px rgba(0, 225, 255, 0.5);
            transition: width 0.8s cubic-bezier(0.2, 0, 0, 1);
        }

        .timeline {
            display: flex;
            flex-direction: column;
            position: relative;
            margin-bottom: 24px;
        }

        .step {
            display: flex;
            align-items: flex-start;
            position: relative;
            padding-bottom: 32px;
            gap: 16px;
        }

        /* 3D Glowing Connecting Line */
        .step::after {
            content: '';
            position: absolute;
            left: 17px;
            top: 40px;
            bottom: 6px;
            width: 2px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            transition: background 0.4s, box-shadow 0.4s;
        }

        .step:last-child::after { display: none; }

        .step.done::after {
            background: var(--neon-green);
            box-shadow: 0 0 8px var(--neon-green);
        }

        /* 3D Glass Nodes */
        .step-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2), inset 0 2px 2px rgba(255,255,255,0.1);
            color: var(--text-muted);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            transition: all 0.4s cubic-bezier(0.2, 0, 0, 1);
            z-index: 2;
            flex-shrink: 0;
        }

        .step-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-muted);
            padding-top: 6px;
            transition: color 0.3s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        /* Node States */
        .step.active .step-icon {
            background: rgba(0, 225, 255, 0.2);
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 16px rgba(0, 225, 255, 0.4), inset 0 0 8px rgba(0, 225, 255, 0.4);
            animation: node-pulse 2s infinite;
        }

        .step.active .step-text {
            color: var(--neon-blue);
            font-weight: 800;
            text-shadow: 0 0 8px rgba(0, 225, 255, 0.3);
        }

        .step.done .step-icon {
            background: rgba(0, 255, 136, 0.2);
            border-color: var(--neon-green);
            color: var(--neon-green);
            box-shadow: 0 0 16px rgba(0, 255, 136, 0.3), inset 0 0 8px rgba(0, 255, 136, 0.3);
        }

        .step.done .step-text { color: var(--text-main); }

        .step.error .step-icon {
            background: rgba(255, 51, 102, 0.2);
            border-color: var(--error-color);
            color: var(--error-color);
            box-shadow: 0 0 16px rgba(255, 51, 102, 0.3);
        }
        .step.error .step-text { color: var(--error-color); }

        @keyframes node-pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 225, 255, 0.4), inset 0 0 8px rgba(0, 225, 255, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(0, 225, 255, 0), inset 0 0 8px rgba(0, 225, 255, 0.4); }
            100% { box-shadow: 0 0 0 0 rgba(0, 225, 255, 0), inset 0 0 8px rgba(0, 225, 255, 0.4); }
        }

        /* 3D Glass Terminal */
        .terminal-log {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 16px;
            font-size: 12px;
            font-family: monospace;
            color: rgba(255,255,255,0.7);
            height: 110px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 8px 16px rgba(0,0,0,0.6);
            scroll-behavior: smooth;
            margin-bottom: 16px;
        }

        .terminal-log div { margin-bottom: 6px; }

        /* Success Liquid Link */
        .success-link {
            display: none;
            margin-top: 8px;
            padding: 16px;
            background: linear-gradient(135deg, #00ff88, #00b3ff);
            color: var(--text-dark);
            border-radius: 100px;
            text-align: center;
            font-weight: 800;
            font-size: 16px;
            text-decoration: none;
            box-shadow: 0 8px 24px rgba(0, 255, 136, 0.4), inset 0 2px 2px rgba(255,255,255,0.5);
            animation: slideUpFade 0.5s cubic-bezier(0.2, 0, 0, 1);
            transition: transform 0.2s;
        }

        .success-link:active { transform: scale(0.96); }

        @keyframes slideUpFade {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .footer {
            margin-top: 32px;
            font-size: 13px;
            font-weight: 700;
            color: rgba(255,255,255,0.3);
            text-align: center;
            letter-spacing: 1px;
        }

        button#resetBtn {
            background: rgba(255,255,255,0.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2), inset 0 1px 1px rgba(255,255,255,0.1);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
        }
        button#resetBtn:active { box-shadow: inset 0 2px 5px rgba(0,0,0,0.3); }

    </style>
</head>
<body>

<!-- Liquid Animated Background -->
<div class="liquid-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<div class="app-container" id="mainCard">
    <div class="header-area">
        <h1>GP Deployer</h1>
        <p class="subtitle">Next-Gen Deployment</p>
    </div>

    <!-- Input Form Screen -->
    <div id="inputScreen">
        <div class="input-group">
            <label>GitHub Access Key (PAT)</label>
            <input type="password" id="token" placeholder="ghp_xxxxxxxx..." autocomplete="off" spellcheck="false">
        </div>

        <div class="input-group">
            <label>Repository Name</label>
            <input type="text" id="repoName" placeholder="my-awesome-site" autocomplete="off" spellcheck="false">
        </div>

        <div class="input-group">
            <label>Upload HTML File</label>
            <input type="file" id="fileInput" accept=".html">
        </div>

        <div class="action-container">
            <button id="deployBtn" onclick="startUltimateDeploy()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"></path><path d="M22 2L15 22L11 13L2 9L22 2Z"></path></svg>
                Launch Project
            </button>
        </div>
    </div>

    <!-- Real-Time Progress Screen -->
    <div id="progressScreen">
        <div class="progress-header">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
        </div>

        <div class="timeline">
            <div class="step" id="step1">
                <div class="step-icon">1</div>
                <div class="step-text">Authentication</div>
            </div>
            <div class="step" id="step2">
                <div class="step-icon">2</div>
                <div class="step-text">Provisioning Repository</div>
            </div>
            <div class="step" id="step3">
                <div class="step-icon">3</div>
                <div class="step-text">Uploading Source Code</div>
            </div>
            <div class="step" id="step4">
                <div class="step-icon">4</div>
                <div class="step-text">Activating GitHub Pages</div>
            </div>
            <div class="step" id="step5">
                <div class="step-icon">5</div>
                <div class="step-text">Building & Deploying</div>
            </div>
        </div>

        <div class="terminal-log" id="log"></div>

        <a id="finalLink" class="success-link" target="_blank">🌐 Open Live Site</a>
        <button id="resetBtn" style="display:none; margin-top: 16px;" onclick="resetUI()">Deploy Another</button>
    </div>
</div>

<div class="footer">Created by Roshan Ingle</div>

<script>
    // Security layer: Keep PAT encrypted in JS memory closure, not globally accessible or stored in DOM.
    const KeyVault = (() => {
        let _secureKey = new Uint8Array(0);
        const encoder = new TextEncoder();
        const decoder = new TextDecoder();
        
        return {
            setKey: (str) => {
                _secureKey = encoder.encode(str);
            },
            getKey: () => {
                return decoder.decode(_secureKey);
            },
            hasKey: () => _secureKey.length > 0,
            clear: () => {
                _secureKey = new Uint8Array(0);
            }
        };
    })();

    let user = "";
    
    const terminalLog = (msg, isError = false) => { 
        const logBox = document.getElementById('log');
        const color = isError ? 'var(--error-color)' : 'inherit';
        logBox.innerHTML += `<div style="color: ${color}">> ${msg}</div>`; 
        logBox.scrollTop = logBox.scrollHeight;
    };

    const updateStep = (stepNum, status) => {
        const step = document.getElementById(`step${stepNum}`);
        if (!step) return;
        
        step.className = `step ${status}`;
        if (status === 'done') {
            // Soft rounded SVG checkmark for 3D UI
            step.querySelector('.step-icon').innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
        } else if (status === 'error') {
            step.querySelector('.step-icon').innerHTML = '!';
        }
    };

    const setProgress = (percentage) => {
        document.getElementById('progressBar').style.width = `${percentage}%`;
    };

    const switchScreen = (toProgress) => {
        const inputScreen = document.getElementById('inputScreen');
        const progressScreen = document.getElementById('progressScreen');
        
        if (toProgress) {
            inputScreen.style.display = 'none';
            progressScreen.classList.add('active');
        } else {
            inputScreen.style.display = 'block';
            progressScreen.classList.remove('active');
            document.getElementById('log').innerHTML = '';
            document.getElementById('finalLink').style.display = 'none';
            document.getElementById('resetBtn').style.display = 'none';
            setProgress(0);
            for(let i=1; i<=5; i++) {
                const step = document.getElementById(`step${i}`);
                step.className = 'step';
                step.querySelector('.step-icon').innerHTML = i;
            }
        }
    };

    const resetUI = () => switchScreen(false);

    const utf8ToBase64 = (str) => btoa(unescape(encodeURIComponent(str)));

    // Advanced API handler with Auto-Resolving & Retries utilizing secure KeyVault
    async function api(path, method = 'GET', body = null, retries = 3) {
        const t = KeyVault.getKey();
        if (!t) throw new Error("Authentication key is missing securely.");

        const opt = { 
            method, 
            headers: { 
                'Authorization': `token ${t}`, 
                'Accept': 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28' 
            } 
        };
        if (body) opt.body = JSON.stringify(body);

        for (let i = 0; i < retries; i++) {
            try {
                const r = await fetch(`https://api.github.com${path}`, opt);
                
                if (r.ok) return r.status === 204 ? true : r.json();
                
                const errData = await r.json().catch(() => ({ message: r.statusText }));
                
                // Rate Limiting Auto-Resolve
                if (r.status === 403 && errData.message.includes('rate limit')) {
                    terminalLog(`Rate limit hit. Retrying in ${2 * (i + 1)}s...`, true);
                    await new Promise(res => setTimeout(res, 2000 * (i + 1)));
                    continue;
                }

                // Temporary Server Errors Auto-Resolve
                if (r.status >= 500) {
                    terminalLog(`Server error ${r.status}. Retrying...`, true);
                    await new Promise(res => setTimeout(res, 1500 * (i + 1)));
                    continue;
                }

                // Throw detailed error for logic to handle
                throw { status: r.status, message: errData.message || r.statusText, data: errData };

            } catch (err) {
                if (err.status) throw err; // Re-throw recognized HTTP errors
                if (i === retries - 1) throw err; // Network error on last retry
                await new Promise(res => setTimeout(res, 1000));
            }
        }
        throw new Error("Max retries reached");
    }

    async function startUltimateDeploy() {
        const tokenInput = document.getElementById('token');
        let rawToken = tokenInput.value.trim();
        let name = document.getElementById('repoName').value.trim();
        const file = document.getElementById('fileInput').files[0];

        // Security Validation
        if (rawToken && rawToken !== '••••••••••••••••') {
            KeyVault.setKey(rawToken);
            // Completely wipe the raw token from DOM and mask it visually
            tokenInput.value = '••••••••••••••••'; 
        }

        if (!name || !file) return alert("⚠️ Repository name and HTML file are required!");
        if (!KeyVault.hasKey()) return alert("⚠️ GitHub Access Key is required!");
        
        // Sanitize repository name
        name = name.toLowerCase().replace(/[^a-z0-9-_]/g, '-');
        
        switchScreen(true);
        setProgress(5);

        try {
            // STEP 1: Authentication
            updateStep(1, 'active');
            terminalLog("Authenticating securely with GitHub...");
            const userData = await api('/user');
            user = userData.login;
            updateStep(1, 'done');
            setProgress(20);

            // STEP 2: Create or Verify Repository
            updateStep(2, 'active');
            terminalLog(`Provisioning repository: ${name}`);
            try {
                await api('/user/repos', 'POST', { name, auto_init: true });
                terminalLog("Created new repository.");
                await new Promise(res => setTimeout(res, 1500)); 
            } catch (e) {
                if (e.status === 422) {
                    try {
                        // Verify repo actually exists under the user
                        await api(`/repos/${user}/${name}`);
                        terminalLog("Repository already exists. Synchronizing...");
                    } catch (err) {
                        throw new Error("Repository creation failed and cannot access existing repository.");
                    }
                } else {
                    throw e;
                }
            }
            updateStep(2, 'done');
            setProgress(40);

            // STEP 3: Upload or Update Code
            updateStep(3, 'active');
            terminalLog("Reading HTML file...");
            const reader = new FileReader();
            
            const uploadPromise = new Promise((resolve, reject) => {
                reader.onload = async () => {
                    try {
                        let content = reader.result;
                        let sha = null;
                        
                        try {
                            // Check if index.html already exists to get its SHA for an update
                            const fileData = await api(`/repos/${user}/${name}/contents/index.html`);
                            sha = fileData.sha;
                            terminalLog("Found existing index.html. Preparing to update file...");
                        } catch(e) {
                            if (e.status !== 404) throw e;
                        }

                        terminalLog("Committing source code to main branch...");
                        const payload = { 
                            message: sha ? "Update deployment via GP Deployer" : "Initial deployment via GP Deployer", 
                            content: utf8ToBase64(content) 
                        };
                        if (sha) payload.sha = sha; // SHA is required to overwrite existing files on GitHub API

                        await api(`/repos/${user}/${name}/contents/index.html`, 'PUT', payload);
                        resolve();
                    } catch (err) {
                        reject(err);
                    }
                };
                reader.onerror = () => reject(new Error("Failed to read file"));
            });
            
            reader.readAsText(file);
            await uploadPromise;
            updateStep(3, 'done');
            setProgress(60);

            // STEP 4: Activate GitHub Pages
            updateStep(4, 'active');
            terminalLog("Configuring GitHub Pages environment...");
            
            let pagesExists = false;
            try {
                // Check if Pages is already configured
                await api(`/repos/${user}/${name}/pages`);
                pagesExists = true;
                terminalLog("GitHub Pages already configured.");
            } catch(e) {
                if (e.status !== 404) throw e;
            }

            if (!pagesExists) {
                // Auto-resolve: GitHub sometimes takes time to recognize the branch exists initially
                let pagesActivated = false;
                for(let i=0; i<5; i++) {
                    try {
                        await api(`/repos/${user}/${name}/pages`, 'POST', { source: { branch: 'main', path: '/' } });
                        pagesActivated = true;
                        break;
                    } catch(e) {
                        if (e.status === 409) {
                            terminalLog("Branch not ready yet, retrying...", true);
                            await new Promise(res => setTimeout(res, 2000));
                        } else {
                            throw e;
                        }
                    }
                }
                if (!pagesActivated) throw new Error("Could not activate pages. Branch sync failed.");
            } else {
                // Request a fresh build explicitly if pages already existed to fast-track update visibility
                try {
                    await api(`/repos/${user}/${name}/pages/builds`, 'POST');
                    terminalLog("Requested fresh Pages build.");
                } catch(e) {
                    // Ignore, GitHub Actions might already be processing it
                }
            }
            
            updateStep(4, 'done');
            setProgress(80);

            // STEP 5: Polling for Build Status
            updateStep(5, 'active');
            checkLiveStatus(name);

        } catch (e) {
            terminalLog(`CRITICAL ERROR: ${e.message}`, true);
            // Identify which step failed and mark it
            for(let i=1; i<=5; i++) {
                const step = document.getElementById(`step${i}`);
                if (step.className.includes('active')) {
                    updateStep(i, 'error');
                    break;
                }
            }
            document.getElementById('resetBtn').style.display = 'flex';
            document.getElementById('resetBtn').innerText = 'Try Again';
        }
    }

    async function checkLiveStatus(repo) {
        terminalLog("Waiting for GitHub Actions to complete build...");
        const url = `https://${user}.github.io/${repo}/`;
        
        let attempts = 0;
        const maxAttempts = 60; // 5 mins total

        const interval = setInterval(async () => {
            attempts++;
            try {
                // Fetch using Secure KeyVault
                const r = await fetch(`https://api.github.com/repos/${user}/${repo}/pages`, {
                    headers: { 
                        'Authorization': `token ${KeyVault.getKey()}`, 
                        'Accept': 'application/vnd.github+json',
                        'X-GitHub-Api-Version': '2022-11-28' 
                    }
                });

                if (r.ok) {
                    const pagesInfo = await r.json();
                    
                    // Update progress visually based on status
                    if (pagesInfo.status === "building") {
                        terminalLog(`Build in progress... (${attempts})`);
                        setProgress(85 + (attempts % 10)); // visually loop between 85-95%
                    }

                    if (pagesInfo.status === "built") {
                        clearInterval(interval);
                        updateStep(5, 'done');
                        setProgress(100);
                        terminalLog("Deployment Successful! Site is Live.");
                        
                        const link = document.getElementById('finalLink');
                        link.href = url;
                        link.style.display = "block";
                        
                        document.getElementById('resetBtn').style.display = 'flex';
                    }
                } else if (r.status === 404) {
                    terminalLog(`Provisioning environment... (${attempts})`);
                }
            } catch (e) {
                // Ignore network errors during polling
            }

            if (attempts >= maxAttempts) {
                clearInterval(interval);
                updateStep(5, 'error');
                terminalLog("Polling timed out. Check GitHub repository manually.", true);
                document.getElementById('resetBtn').style.display = 'flex';
            }
        }, 4000); 
    }
</script>
